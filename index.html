<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> ⏱️ Pomodoro Timer </title>
   <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/modes.css" />
  <link rel="stylesheet" href="css/timer.css" />
  <link rel="stylesheet" href="css/controls.css" />
  <link rel="stylesheet" href="css/stats.css" />
  <link rel="stylesheet" href="css/settings.css" />
</head>
<body>

  <!-- ════════════════════════════════════════════════════
    MODULE: Header
    Shows the app title and a settings toggle button.
  ════════════════════════════════════════════════════ -->
  <header class="app-header">
    <h1 class="app-title">🍅 Pomodoro</h1>
    <button class="btn-settings" id="btnSettings" aria-label="Open settings">⚙</button>
  </header>

  <!-- ════════════════════════════════════════════════════
    MODULE: Mode Tabs
    Lets the user switch between Work session and Break.
  ════════════════════════════════════════════════════ -->
  <section class="mode-tabs" aria-label="Timer mode selector">
    <button class="tab active" data-mode="work">Work</button>
    <button class="tab" data-mode="short">Short Break</button>
    <button class="tab" data-mode="long">Long Break</button>
  </section>

  <!-- ════════════════════════════════════════════════════
    MODULE: Timer Face
    The big circular countdown display.
  ════════════════════════════════════════════════════ -->
  <main class="timer-wrapper">
    <div class="timer-ring-container" role="timer" aria-live="polite">
      <!-- SVG ring that animates as time passes -->
      <svg class="progress-ring" viewBox="0 0 200 200" aria-  hidden="true">
        <circle class="ring-track" cx="100" cy="100" r="88" />
        <circle class="ring-progress" id="ringProgress" cx="100" cy="100" r="88" />
      </svg>

      <!-- Countdown digits in the center of the ring -->
      <div class="timer-display">
        <span class="timer-minutes" id="timerMinutes">25</span>
        <span class="timer-colon">:</span>
        <span class="timer-seconds" id="timerSeconds">00</span>
      </div>

      <!-- Label below the digits (e.g. "Focus time") -->
      <p class="timer-label" id="timerLabel">Focus time</p>
    </div>

    <!-- ════════════════════════════════════════════════
        MODULE: Controls
        Start, Pause, and Reset buttons below the clock.
      ════════════════════════════════════════════════ -->
      <div class="controls" role="group" aria-label="Timer controls">
        <button class="btn-control btn-secondary" id="btnReset" aria-label="Reset timer">↺ Reset</button>
        <button class="btn-control btn-primary" id="btnStart" aria-label="Start timer">▶ Start</button>
      </div>
    </main>

  <!-- ════════════════════════════════════════════════════
    MODULE: Stats Bar
    Tracks how many pomodoros have been completed today.
  ════════════════════════════════════════════════════ -->
  <section class="stats-bar" aria-label="Today's progress">
    <p class="stats-label">Today</p>
    <div class="pomodoro-dots" id="pomatoDots" aria-label="Completed pomodoros">
      <!-- Dots are injected by stats.js -->
    </div>
    <p class="stats-count">
      <span id="statsCount">0</span> pomodoros
    </p>
  </section>

  <!-- ════════════════════════════════════════════════════
    MODULE: Settings Panel
    Slide-in panel to change durations. Hidden by default.
  ════════════════════════════════════════════════════ -->
  <aside class="settings-panel" id="settingsPanel" aria-hidden="true">
    <div class="settings-inner">
      <h2 class="settings-title">Settings</h2>

      <label class="settings-row">
        <span>Work duration (min)</span>
        <input type="number" id="setWork" class="settings-input" value="25" min="1" max="60" />
      </label>

      <label class="settings-row">
        <span>Short break (min)</span>
        <input type="number" id="setShort" class="settings-input" value="5" min="1" max="30" />
      </label>

      <label class="settings-row">
        <span>Long break (min)</span>
        <input type="number" id="setLong" class="settings-input" value="15" min="1" max="60" />
      </label>

      <button class="btn-save" id="btnSave">Save</button>
      <button class="btn-close-settings" id="btnCloseSettings" aria-label="Close settings">✕</button>
    </div>
  </aside>

  <!-- Overlay behind the settings panel -->
  <div class="overlay" id="overlay"></div>

  <!-- ════════════════════════════════════════════════════
                           JS files
  ════════════════════════════════════════════════════ -->
  
  <script src="js/config.js"></script>     <!-- App-wide constants & defaults  -->

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-TQHQCHK4DN"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-TQHQCHK4DN');
  </script>
</body>
</html>
